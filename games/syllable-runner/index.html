<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 2</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --ink: #35200c;
      --ink-soft: #6b3d15;
      --paper: #fff4ca;
      --paper-light: #fffbe7;
      --gold: #ffd057;
      --gold-dark: #b66a11;
      --red: #d94635;
      --blue: #2b7fc2;
      --green: #2ea55f;
      --grass: #5dbc5a;
      --wood: #714016;
      --wood-dark: #46220c;
      --sky: #83d7ff;
      --shadow: rgba(58, 30, 8, 0.28);
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      padding: 18px;
      color: var(--ink);
      font-family: "Trebuchet MS", Arial, sans-serif;
      background:
        linear-gradient(180deg, rgba(121, 205, 255, 0.42), rgba(255, 230, 138, 0.55)),
        url("../../assets/images/kingdom-hero.png");
      background-size: cover;
      background-position: center top;
      overflow-x: hidden;
    }

    button,
    input,
    a {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .game {
      position: relative;
      width: min(1180px, 100%);
      min-height: calc(100vh - 36px);
      margin: 0 auto;
      border: 4px solid var(--wood);
      border-radius: 8px;
      background: rgba(255, 244, 202, 0.97);
      box-shadow: 0 14px 0 #7e4b1d, 0 24px 70px var(--shadow);
      overflow: hidden;
    }

    .game::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(113, 64, 22, 0.08) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.36), rgba(176, 99, 28, 0.08));
      background-size: 44px 44px, auto;
      pointer-events: none;
    }

    .screen {
      position: relative;
      z-index: 1;
      display: none;
      min-height: calc(100vh - 44px);
      padding: clamp(14px, 2.4vw, 28px);
    }

    .screen.active {
      display: block;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .crest {
      display: grid;
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
      place-items: center;
      border: 3px solid var(--wood);
      border-radius: 8px;
      background:
        linear-gradient(135deg, transparent 0 48%, rgba(255, 255, 255, 0.22) 50%, transparent 52%),
        linear-gradient(160deg, #e33d35 0 50%, #f9c94b 50% 100%);
      box-shadow: inset 0 -5px rgba(92, 45, 11, 0.18), 0 5px 0 #7b4718;
    }

    .crest::before {
      content: "";
      width: 21px;
      height: 28px;
      border-radius: 4px 4px 10px 10px;
      background: #2b7fc2;
      clip-path: polygon(0 0, 100% 0, 100% 70%, 50% 100%, 0 70%);
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.26);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(32px, 5vw, 66px);
      line-height: 0.95;
      letter-spacing: 0;
      color: #4a250d;
      text-shadow: 0 3px 0 #ffd86a;
    }

    h2 {
      font-size: clamp(24px, 3.5vw, 42px);
      line-height: 1;
      color: #4a250d;
      text-shadow: 0 2px 0 #ffe18a;
    }

    h3 {
      font-size: 20px;
      color: #4a250d;
    }

    .kicker {
      margin-bottom: 5px;
      color: var(--ink-soft);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 16px;
      border: 3px solid var(--wood);
      border-radius: 8px;
      color: #351a08;
      font-weight: 900;
      background: linear-gradient(180deg, #fff1a7, #ffc54a);
      box-shadow: 0 5px 0 #8c5017;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 0 #8c5017;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #8c5017;
    }

    .btn.secondary {
      background: linear-gradient(180deg, #fffbe6, #f5d889);
    }

    .btn.blue {
      color: white;
      background: linear-gradient(180deg, #5bb5ff, #236eb5);
      box-shadow: 0 5px 0 #154574;
    }

    .btn.green {
      color: white;
      background: linear-gradient(180deg, #57d983, #23854c);
      box-shadow: 0 5px 0 #155b34;
    }

    .btn.red {
      color: white;
      background: linear-gradient(180deg, #ff7b68, #bf3328);
      box-shadow: 0 5px 0 #802016;
    }

    .btn:disabled {
      cursor: default;
      filter: grayscale(0.45);
      opacity: 0.68;
      transform: none;
    }

    .hero-layout {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(320px, 1.1fr);
      gap: clamp(18px, 3vw, 34px);
      align-items: center;
      min-height: 560px;
    }

    .hero-copy {
      display: grid;
      gap: 18px;
      align-content: center;
    }

    .hero-copy p {
      max-width: 520px;
      color: #5b3110;
      font-size: clamp(18px, 2.4vw, 24px);
      font-weight: 800;
      line-height: 1.35;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stat-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stat {
      min-width: 130px;
      padding: 10px 12px;
      border: 3px solid var(--wood);
      border-radius: 8px;
      background: rgba(255, 251, 231, 0.92);
      box-shadow: 0 5px 0 rgba(113, 64, 22, 0.32);
      font-weight: 900;
    }

    .stat span {
      display: block;
      color: var(--ink-soft);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .hero-stage {
      position: relative;
      min-height: 410px;
      border: 4px solid #6d3d14;
      border-radius: 8px;
      background:
        linear-gradient(180deg, #8bd8ff 0 48%, #77c75a 48% 74%, #d59746 74% 100%);
      box-shadow: inset 0 -16px rgba(89, 45, 11, 0.16), 0 10px 0 #7f4a1b;
      overflow: hidden;
    }

    .hero-stage::before {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 22%;
      height: 22%;
      border: 5px solid #7a4317;
      border-radius: 50% 50% 0 0;
      background: #b96b26;
      box-shadow:
        76px -42px 0 -12px #b96b26,
        150px -72px 0 -22px #b96b26,
        inset 0 12px rgba(255, 255, 255, 0.22);
    }

    .hero-stage::after {
      content: "";
      position: absolute;
      left: -6%;
      right: -6%;
      bottom: 0;
      height: 26%;
      background:
        repeating-linear-gradient(90deg, rgba(255, 235, 169, 0.22) 0 32px, transparent 32px 64px),
        linear-gradient(180deg, #c28036, #925018);
    }

    .hero-runner {
      position: absolute;
      left: 11%;
      bottom: 10%;
      z-index: 3;
      width: clamp(120px, 20vw, 180px);
      height: clamp(178px, 30vw, 270px);
      object-fit: contain;
      filter: drop-shadow(0 10px 0 rgba(72, 35, 9, 0.25));
      animation: idleFloat 1.5s ease-in-out infinite;
    }

    .hero-target {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 300px;
      padding: 12px;
      border: 3px solid var(--wood);
      border-radius: 8px;
      background: rgba(255, 251, 231, 0.96);
      box-shadow: 0 7px 0 rgba(113, 64, 22, 0.32);
      font-size: 23px;
      font-weight: 900;
    }

    .hero-target img {
      width: 82px;
      height: 82px;
      flex: 0 0 auto;
      border-radius: 8px;
      object-fit: contain;
      background: #fff8d9;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .level-grid,
    .skin-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .panel,
    .level-card,
    .skin-card,
    .result-card,
    .word-card {
      border: 3px solid var(--wood);
      border-radius: 8px;
      background: rgba(255, 251, 231, 0.95);
      box-shadow: 0 7px 0 rgba(113, 64, 22, 0.34);
    }

    .level-card,
    .skin-card {
      display: grid;
      gap: 12px;
      align-content: start;
      padding: 14px;
    }

    .level-card.locked {
      opacity: 0.62;
    }

    .level-card .badge,
    .skin-card .badge {
      display: inline-flex;
      width: fit-content;
      padding: 5px 9px;
      border: 2px solid var(--wood);
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      background: var(--blue);
    }

    .level-card p,
    .skin-card p {
      color: var(--ink-soft);
      font-weight: 800;
      line-height: 1.35;
    }

    .skin-preview {
      display: grid;
      min-height: 150px;
      place-items: center;
      border: 3px solid rgba(113, 64, 22, 0.35);
      border-radius: 8px;
      background:
        linear-gradient(180deg, #8bd8ff 0 52%, #72c95d 52% 100%);
      overflow: hidden;
    }

    .skin-preview img {
      width: 126px;
      height: 126px;
      object-fit: contain;
      filter: drop-shadow(0 8px 0 rgba(72, 35, 9, 0.22));
    }

    .play-layout {
      display: grid;
      grid-template-columns: minmax(280px, 0.78fr) minmax(420px, 1.22fr);
      gap: 16px;
      align-items: start;
    }

    .side {
      display: grid;
      gap: 14px;
    }

    .target-card {
      display: grid;
      grid-template-columns: 116px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 3px solid var(--wood);
      border-radius: 8px;
      background: linear-gradient(180deg, #fffbe7, #ffe9a4);
      box-shadow: 0 7px 0 rgba(113, 64, 22, 0.36);
    }

    .target-card img {
      width: 116px;
      height: 116px;
      border: 3px solid var(--wood);
      border-radius: 8px;
      object-fit: contain;
      background: #fffdf1;
    }

    .target-word {
      min-width: 0;
      font-size: clamp(30px, 5vw, 50px);
      font-weight: 900;
      line-height: 1;
      color: #4a250d;
      word-break: break-word;
    }

    .target-actions {
      margin-top: 10px;
    }

    .btn.small {
      min-height: 36px;
      padding: 7px 12px;
      font-size: 14px;
      box-shadow: 0 4px 0 #8c5017;
    }

    .word-rail {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
      max-height: 336px;
      overflow: auto;
      padding-right: 4px;
    }

    .word-card {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      min-height: 72px;
      padding: 7px;
    }

    .word-card img {
      width: 54px;
      height: 54px;
      border: 2px solid rgba(113, 64, 22, 0.38);
      border-radius: 8px;
      object-fit: contain;
      background: #fffdf1;
    }

    .word-card b,
    .word-card span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .word-card b {
      font-size: 16px;
      color: #4a250d;
    }

    .word-card span {
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 900;
    }

    .word-card.current {
      outline: 4px solid var(--gold);
      background: #fff2a8;
    }

    .word-card.correct {
      background: #dff8df;
    }

    .word-card.wrong {
      background: #ffd8d3;
    }

    .builder,
    .stage-panel,
    .hud,
    .review {
      padding: 12px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      border: 3px solid var(--wood);
      border-radius: 8px;
      background: rgba(255, 251, 231, 0.92);
      box-shadow: 0 7px 0 rgba(113, 64, 22, 0.28);
    }

    .hud .stat {
      min-width: 0;
      box-shadow: none;
    }

    .builder {
      display: grid;
      gap: 12px;
    }

    .syllable-input {
      width: 100%;
      min-height: 58px;
      padding: 12px 14px;
      border: 3px dashed rgba(113, 64, 22, 0.45);
      border-radius: 8px;
      color: #351a08;
      background: rgba(255, 255, 255, 0.35);
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 900;
      outline: none;
    }

    .syllable-input:focus {
      border-color: var(--gold-dark);
      background: #fffdf1;
    }

    .input-example {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: #5b3110;
      font-weight: 900;
    }

    .input-example strong {
      padding: 5px 10px;
      border: 2px solid var(--wood);
      border-radius: 8px;
      background: #fff2a8;
      color: #4a250d;
      font-size: 22px;
    }

    .hint-box {
      min-height: 48px;
      padding: 10px 12px;
      border: 3px solid rgba(113, 64, 22, 0.45);
      border-radius: 8px;
      color: #4a250d;
      background: #fff2a8;
      font-size: 22px;
      font-weight: 900;
    }

    .builder-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .message {
      min-height: 28px;
      color: #4a250d;
      font-weight: 900;
    }

    .stage-panel {
      display: grid;
      gap: 12px;
    }

    .stage {
      position: relative;
      min-height: 330px;
      border: 4px solid var(--wood);
      border-radius: 8px;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.55), transparent 18%),
        linear-gradient(180deg, var(--sky) 0 54%, var(--grass) 54% 75%, #ca8034 75% 100%);
      box-shadow: inset 0 -12px rgba(79, 41, 10, 0.14);
      overflow: hidden;
    }

    .stage::before {
      content: "";
      position: absolute;
      left: 2%;
      right: 2%;
      bottom: 11%;
      height: 72px;
      border-top: 5px solid #744016;
      border-bottom: 5px solid #744016;
      background:
        repeating-linear-gradient(90deg, rgba(255, 231, 156, 0.28) 0 34px, transparent 34px 68px),
        linear-gradient(180deg, #d79748, #a95d1f);
    }

    .stage::after {
      content: "";
      position: absolute;
      left: 6%;
      right: 6%;
      bottom: 39%;
      height: 88px;
      border: 5px solid #7d4519;
      border-bottom: 0;
      border-radius: 70px 70px 0 0;
      background: rgba(185, 106, 38, 0.78);
      box-shadow:
        78px -35px 0 -16px rgba(185, 106, 38, 0.78),
        156px -58px 0 -26px rgba(185, 106, 38, 0.78),
        inset 0 10px rgba(255, 255, 255, 0.18);
    }

    .runner {
      position: absolute;
      left: 34px;
      bottom: 58px;
      z-index: 5;
      width: clamp(94px, 13vw, 128px);
      height: clamp(142px, 19vw, 184px);
      object-fit: contain;
      filter: drop-shadow(0 8px 0 rgba(72, 35, 9, 0.26));
      transition: left 0.48s ease, transform 0.36s ease;
      transform-origin: 50% 100%;
    }

    .runner.jump {
      transform: translateY(-105px) rotate(-5deg);
    }

    .runner.slide {
      transform: translateY(12px) scaleY(0.66);
    }

    .runner.hit {
      animation: hit 0.56s ease;
    }

    .obstacles {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .obstacle {
      position: absolute;
      display: grid;
      justify-items: center;
      gap: 4px;
      width: 118px;
      transform: translateX(-50%);
    }

    .obstacle img {
      display: block;
      width: 118px;
      height: 118px;
      object-fit: contain;
      filter: drop-shadow(0 7px 0 rgba(72, 35, 9, 0.22));
    }

    .obstacle.jump {
      bottom: 62px;
    }

    .obstacle.jump img {
      width: 132px;
      height: 74px;
    }

    .obstacle.slide {
      bottom: 62px;
    }

    .obstacle.slide img {
      width: 120px;
      height: 124px;
    }

    .obstacle span {
      min-width: 54px;
      max-width: 112px;
      padding: 4px 7px;
      border: 2px solid var(--wood);
      border-radius: 8px;
      color: #351a08;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      background: #fff6bd;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .progress {
      height: 18px;
      border: 3px solid var(--wood);
      border-radius: 999px;
      background: #f2cf83;
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #56cf7b, #ffd057);
      transition: width 0.28s ease;
    }

    .review-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .result-card {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 9px;
    }

    .result-card img {
      width: 64px;
      height: 64px;
      border: 2px solid rgba(113, 64, 22, 0.38);
      border-radius: 8px;
      object-fit: contain;
      background: #fffdf1;
    }

    .result-card b,
    .result-card span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-card.correct {
      background: #dff8df;
    }

    .result-card.wrong {
      background: #ffd8d3;
    }

    .hidden {
      display: none !important;
    }

    @keyframes idleFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes hit {
      0%,
      100% {
        transform: translateX(0) rotate(0);
      }
      25% {
        transform: translateX(-12px) rotate(-6deg);
      }
      55% {
        transform: translateX(10px) rotate(6deg);
      }
      80% {
        transform: translateX(-5px) rotate(-3deg);
      }
    }

    @media (max-width: 900px) {
      body {
        padding: 10px;
      }

      .screen {
        min-height: calc(100vh - 28px);
      }

      .hero-layout,
      .play-layout {
        grid-template-columns: 1fr;
      }

      .hero-stage {
        min-height: 340px;
      }

      .target-card {
        grid-template-columns: 96px minmax(0, 1fr);
      }

      .target-card img {
        width: 96px;
        height: 96px;
      }

      .stage {
        min-height: 290px;
      }
    }

    @media (max-width: 640px) {
      .game {
        margin-bottom: 78px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav {
        justify-content: flex-start;
      }

      .btn {
        width: 100%;
      }

      .hero-actions,
      .builder-actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .stat-row,
      .hud {
        grid-template-columns: 1fr;
      }

      .hero-target {
        left: 14px;
        right: 14px;
        top: 14px;
      }

      .hero-runner {
        left: 26%;
      }

      .word-rail {
        max-height: none;
      }

      .stage {
        min-height: 250px;
      }

      .runner {
        width: 88px;
        height: 132px;
      }

      .obstacle.jump img {
        width: 112px;
        height: 62px;
      }

      .obstacle.slide img {
        width: 96px;
        height: 102px;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <section id="homeScreen" class="screen active">
      <div class="hero-layout">
        <div class="hero-copy">
          <div class="brand">
            <div class="crest" aria-hidden="true"></div>
            <div>
              <p class="kicker">The Kingdom</p>
              <h1>Chapter 2</h1>
            </div>
          </div>
          <p>Chapter 2</p>
          <div class="stat-row">
            <div class="stat"><span>Gold</span><strong id="homeCredits">0</strong></div>
            <div class="stat"><span>Unlocked</span><strong id="homeUnlocked">1</strong></div>
            <div class="stat"><span>Skin</span><strong id="homeSkin">Prince</strong></div>
          </div>
          <div class="hero-actions">
            <button class="btn green" type="button" data-open="levelsScreen">Play</button>
            <button class="btn blue" type="button" data-open="skinsScreen">Skins</button>
            <a class="btn secondary" href="../../index.html">The Kingdom</a>
          </div>
        </div>
        <div class="hero-stage" aria-hidden="true">
          <img id="heroRunner" class="hero-runner" src="../../assets/images/runner/generated-prince-runner.png" alt="">
          <div class="hero-target">
            <img src="../../assets/images/vocab/syllable-runner/treasure.png" alt="">
            <span>treasure</span>
          </div>
        </div>
      </div>
    </section>

    <section id="levelsScreen" class="screen">
      <div class="topbar">
        <div class="brand">
          <div class="crest" aria-hidden="true"></div>
          <div>
            <p class="kicker">Chapter 2</p>
            <h2>Choose Level</h2>

          <button class="btn blue" type="button" data-open="skinsScreen">Skins</button>
        </div>
      </div>

    </section>

    <section id="skinsScreen" class="screen">
      <div class="topbar">
        <div class="brand">
          <div class="crest" aria-hidden="true"></div>
          <div>
            <p class="kicker">Chapter 2</p>
            <h2>Choose Skin</h2>
          </div>
        </div>
        <div class="nav">
          <button class="btn secondary" type="button" data-open="homeScreen">Home</button>
          <button class="btn green" type="button" data-open="levelsScreen">Play</button>
        </div>
      </div>
      <div class="stat-row" style="margin-bottom: 14px;">
        <div class="stat"><span>Gold</span><strong id="shopCredits">0</strong></div>
        <div class="stat"><span>Selected</span><strong id="shopSelected">Prince</strong></div>
      </div>
      <div id="skinGrid" class="grid skin-grid"></div>
    </section>

    <section id="playScreen" class="screen">
      <div class="topbar">
        <div class="brand">
          <div class="crest" aria-hidden="true"></div>
          <div>
            <p id="playKicker" class="kicker">Level 1</p>
            <h2>Chapter 2</h2>
          </div>
        </div>
        <div class="nav">
          <button class="btn secondary" type="button" data-open="levelsScreen">Levels</button>
          <button class="btn red" type="button" data-open="homeScreen">Exit</button>
        </div>
      </div>

      <div class="play-layout">
        <aside class="side">
          <div class="hud">
            <div class="stat"><span>Score</span><strong id="scoreValue">0</strong></div>

            <div class="stat"><span>Word</span><strong id="wordCount">1/6</strong></div>

          <div class="target-card">
            <img id="targetImage" src="../../assets/images/vocab/syllable-runner/rabbit.png" alt="">
            <div>
              <div id="targetWord" class="target-word">rabbit</div>
              <div class="target-actions">
                <button id="speakButton" class="btn secondary small" type="button">Speak</button>
              </div>
            </div>
          </div>

          <div id="wordRail" class="word-rail"></div>
        </aside>

        <section class="side">
          <div class="panel builder">
            <h3>Build The Word</h3>
            <div class="input-example">Example <strong>Ba na na</strong></div>
            <input id="syllableInput" class="syllable-input" type="text" autocomplete="off" spellcheck="false" placeholder="Type syllables">
            <div id="hintBox" class="hint-box hidden" aria-live="polite"></div>
            <div class="builder-actions">
              <button id="runButton" class="btn green" type="button">Run</button>
              <button id="hintButton" class="btn blue" type="button">Hint</button>
              <button id="clearButton" class="btn secondary" type="button">Clear</button>
              <button id="skipButton" class="btn red" type="button">Skip</button>
            </div>
            <div id="message" class="message" aria-live="polite"></div>
          </div>

          <div class="panel stage-panel">
            <div class="progress" aria-hidden="true"><span id="progressFill"></span></div>
            <div class="stage">
              <div id="obstacles" class="obstacles"></div>
              <img id="runner" class="runner" src="../../assets/images/runner/generated-prince-runner.png" alt="">
            </div>
          </div>
        </section>
      </div>

    <section id="endScreen" class="screen">
      <div class="topbar">
        <div class="brand">
          <div class="crest" aria-hidden="true"></div>
          <div>
            <p class="kicker">Chapter 2</p>
            <h2 id="endTitle">Level Complete</h2>
          </div>
        </div>
        <div class="nav">
          <button id="nextLevelButton" class="btn green" type="button">Next Level</button>
          <button class="btn blue" type="button" data-open="levelsScreen">Levels</button>
          <button class="btn secondary" type="button" data-open="homeScreen">Home</button>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat"><span>Score</span><strong id="endScore">0</strong></div>
        <div class="stat"><span>Gold Earned</span><strong id="endGold">0</strong></div>
        <div class="stat"><span>Correct</span><strong id="endCorrect">0</strong></div>
      </div>
      <div id="reviewGrid" class="review-grid"></div>
    </section>
  </main>

  <script>
    const WORD_IMAGE_BASE = "../../assets/images/vocab/syllable-runner/";
    const RUNNER_IMAGE_BASE = "../../assets/images/runner/";

    const WORDS = Object.freeze([
      { word: "bridge", level: 1, syllables: ["bridge"], types: ["closed"] },
      { word: "rabbit", level: 1, syllables: ["rab", "bit"], types: ["closed", "closed"] },
      { word: "forest", level: 1, syllables: ["for", "est"], types: ["closed", "closed"] },
      { word: "flower", level: 1, syllables: ["flow", "er"], types: ["open", "closed"] },
      { word: "tower", level: 1, syllables: ["tow", "er"], types: ["open", "closed"] },
      { word: "table", level: 1, syllables: ["ta", "ble"], types: ["open", "closed"] },
      { word: "candy", level: 1, syllables: ["can", "dy"], types: ["closed", "open"] },
      { word: "mountain", level: 2, syllables: ["moun", "tain"], types: ["closed", "closed"] },
      { word: "helmet", level: 2, syllables: ["hel", "met"], types: ["closed", "closed"] },
      { word: "carrot", level: 2, syllables: ["car", "rot"], types: ["closed", "closed"] },
      { word: "potato", level: 2, syllables: ["po", "ta", "to"], types: ["open", "open", "open"] },
      { word: "potion", level: 2, syllables: ["po", "tion"], types: ["open", "closed"] },
      { word: "window", level: 2, syllables: ["win", "dow"], types: ["closed", "open"] },
      { word: "listen", level: 2, syllables: ["lis", "ten"], types: ["closed", "closed"] },
      { word: "dungeon", level: 3, syllables: ["dun", "geon"], types: ["closed", "closed"] },
      { word: "treasure", level: 3, syllables: ["trea", "sure"], types: ["open", "closed"] },
      { word: "armor", level: 3, syllables: ["ar", "mor"], types: ["closed", "closed"] },
      { word: "crystal", level: 3, syllables: ["crys", "tal"], types: ["closed", "closed"] },
      { word: "purple", level: 3, syllables: ["pur", "ple"], types: ["closed", "closed"] },
      { word: "pirate", level: 3, syllables: ["pi", "rate"], types: ["open", "closed"] },
      { word: "secret", level: 3, syllables: ["se", "cret"], types: ["open", "closed"] },
      { word: "adventure", level: 4, syllables: ["ad", "ven", "ture"], types: ["closed", "closed", "closed"] },
      { word: "monster", level: 4, syllables: ["mon", "ster"], types: ["closed", "closed"] },
      { word: "captain", level: 4, syllables: ["cap", "tain"], types: ["closed", "closed"] },
      { word: "villager", level: 4, syllables: ["vil", "lag", "er"], types: ["closed", "closed", "closed"] },
      { word: "portal", level: 4, syllables: ["por", "tal"], types: ["closed", "closed"] },
      { word: "danger", level: 4, syllables: ["dan", "ger"], types: ["closed", "closed"] },
      { word: "victory", level: 4, syllables: ["vic", "to", "ry"], types: ["closed", "open", "open"] }
    ]);

    const LEVELS = Object.freeze([
      { id: 1, title: "Bridge Route", count: 7, reward: 10 },
      { id: 2, title: "Tower Route", count: 7, reward: 14 },
      { id: 3, title: "Dungeon Route", count: 7, reward: 18 },
      { id: 4, title: "Victory Route", count: 7, reward: 24 }
    ]);

    const SKINS = Object.freeze([
      { id: "prince", name: "Prince", file: "generated-prince-runner.png", price: 0 },
      { id: "knight", name: "Knight", file: "knight-runner.svg", price: 35 },
      { id: "pirate", name: "Pirate", file: "pirate-runner.svg", price: 45 },
      { id: "captain", name: "Captain", file: "captain-runner.svg", price: 55 },
      { id: "wizard", name: "Wizard", file: "wizard-runner.svg", price: 65 },
      { id: "horse", name: "Horse", file: "horse-runner.svg", price: 75 }
    ]);

    const STORAGE = {
      credits: "csrCredits",
      high: "csrHighestLevel",
      skin: "csrSelectedSkin",
      owned: "csrOwnedSkins"
    };

    const screens = Array.from(document.querySelectorAll(".screen"));
    const homeCredits = document.getElementById("homeCredits");
    const homeUnlocked = document.getElementById("homeUnlocked");
    const homeSkin = document.getElementById("homeSkin");
    const heroRunner = document.getElementById("heroRunner");
    const levelGrid = document.getElementById("levelGrid");
    const skinGrid = document.getElementById("skinGrid");
    const shopCredits = document.getElementById("shopCredits");
    const shopSelected = document.getElementById("shopSelected");
    const playKicker = document.getElementById("playKicker");
    const scoreValue = document.getElementById("scoreValue");
    const goldValue = document.getElementById("goldValue");
    const wordCount = document.getElementById("wordCount");
    const targetImage = document.getElementById("targetImage");
    const targetWord = document.getElementById("targetWord");
    const speakButton = document.getElementById("speakButton");
    const wordRail = document.getElementById("wordRail");
    const syllableInput = document.getElementById("syllableInput");
    const hintBox = document.getElementById("hintBox");
    const runButton = document.getElementById("runButton");
    const hintButton = document.getElementById("hintButton");
    const clearButton = document.getElementById("clearButton");
    const skipButton = document.getElementById("skipButton");
    const message = document.getElementById("message");
    const progressFill = document.getElementById("progressFill");
    const obstacles = document.getElementById("obstacles");
    const runner = document.getElementById("runner");
    const endTitle = document.getElementById("endTitle");
    const endScore = document.getElementById("endScore");
    const endGold = document.getElementById("endGold");
    const endCorrect = document.getElementById("endCorrect");
    const reviewGrid = document.getElementById("reviewGrid");
    const nextLevelButton = document.getElementById("nextLevelButton");

    const state = {
      credits: readNumber(STORAGE.credits, 0),
      highestLevel: clamp(readNumber(STORAGE.high, 1), 1, LEVELS.length),
      selectedSkin: localStorage.getItem(STORAGE.skin) || "prince",
      ownedSkins: readOwnedSkins()
    };

    let session = null;
    let busy = false;
    let audioContext = null;

    sanitizeState();
    bindEvents();
    renderAll();

    function bindEvents() {
      document.addEventListener("click", (event) => {
        unlockAudio();
        const openButton = event.target.closest("[data-open]");
        if (openButton) {
          playSound("click");
          showScreen(openButton.dataset.open);
        }
      });

      speakButton.addEventListener("click", () => {
        if (!session) return;
        unlockAudio();
        playSound("speak");
        speakWord(getCurrentWord().word);
      });
      runButton.addEventListener("click", checkAnswer);
      clearButton.addEventListener("click", clearAnswer);
      hintButton.addEventListener("click", showHint);
      skipButton.addEventListener("click", () => {
        if (busy || !session) return;
        playSound("wrong");
        markCurrent(false);
        animateRun(false, nextWord);
      });

      syllableInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          checkAnswer();
        }
      });

      nextLevelButton.addEventListener("click", () => {
        unlockAudio();
        playSound("click");
        if (!session) {
          showScreen("levelsScreen");
          return;
        }
        const nextId = session.level.id + 1;
        if (nextId <= LEVELS.length && nextId <= state.highestLevel) {
          startLevel(nextId);
        } else {
          showScreen("levelsScreen");
        }
      });
    }

    function renderAll() {
      renderHome();
      renderLevels();
      renderSkins();
    }

    function renderHome() {
      const skin = getSelectedSkin();
      homeCredits.textContent = String(state.credits);
      homeUnlocked.textContent = String(state.highestLevel);
      homeSkin.textContent = skin.name;
      heroRunner.src = runnerImage(skin.file);
    }

    function renderLevels() {
      levelGrid.innerHTML = LEVELS.map((level) => {
        const locked = level.id > state.highestLevel;
        return `
          <article class="level-card ${locked ? "locked" : ""}">
            <span class="badge">Level ${level.id}</span>
            <h3>${escapeHtml(level.title)}</h3>
            <p>${level.count} words - ${level.reward} gold</p>
            <button class="btn ${locked ? "secondary" : "green"}" type="button" ${locked ? "disabled" : ""} data-level="${level.id}">
              ${locked ? "Locked" : "Start"}
            </button>
          </article>
        `;
      }).join("");

      levelGrid.querySelectorAll("[data-level]").forEach((button) => {
        button.addEventListener("click", () => {
          unlockAudio();
          playSound("click");
          startLevel(Number(button.dataset.level));
        });
      });
    }

    function renderSkins() {
      shopCredits.textContent = String(state.credits);
      shopSelected.textContent = getSelectedSkin().name;

      skinGrid.innerHTML = SKINS.map((skin) => {
        const owned = state.ownedSkins.has(skin.id);
        const selected = state.selectedSkin === skin.id;
        const affordable = state.credits >= skin.price;
        let buttonText = "Select";
        if (selected) buttonText = "Selected";
        if (!owned) buttonText = affordable ? `Buy ${skin.price}` : `${skin.price} gold`;
        return `
          <article class="skin-card">
            <span class="badge">${owned ? "Owned" : "Shop"}</span>
            <div class="skin-preview">
              <img src="${runnerImage(skin.file)}" alt="${escapeHtml(skin.name)}">
            </div>
            <h3>${escapeHtml(skin.name)}</h3>
            <p>${skin.price === 0 ? "Free" : `${skin.price} gold`}</p>
            <button class="btn ${selected ? "secondary" : "blue"}" type="button" data-skin="${skin.id}" ${(!owned && !affordable) || selected ? "disabled" : ""}>
              ${buttonText}
            </button>
          </article>
        `;
      }).join("");

      skinGrid.querySelectorAll("[data-skin]").forEach((button) => {
        button.addEventListener("click", () => {
          unlockAudio();
          playSound("click");
          chooseSkin(button.dataset.skin);
        });
      });
    }

    function startLevel(levelId) {
      const level = LEVELS.find((item) => item.id === levelId);
      if (!level || level.id > state.highestLevel) return;

      const words = shuffle(WORDS.filter((item) => item.level === level.id));
      session = {
        level,
        words,
        index: 0,
        score: 0,
        earned: 0,
        results: words.map((item) => ({ word: item.word, status: "pending", answer: "" }))
      };

      playKicker.textContent = `Level ${level.id} - ${level.title}`;
      runner.src = runnerImage(getSelectedSkin().file);
      showScreen("playScreen");
      loadWord();
    }

    function loadWord() {
      if (!session) return;
      if (session.index >= session.words.length) {
        finishLevel();
        return;
      }

      busy = false;
      const current = getCurrentWord();
      targetWord.textContent = current.word;
      targetImage.src = wordImage(current.word);
      targetImage.alt = current.word;
      syllableInput.value = "";
      syllableInput.disabled = false;
      hintBox.textContent = "";
      hintBox.classList.add("hidden");
      scoreValue.textContent = String(session.score);
      goldValue.textContent = String(state.credits);
      wordCount.textContent = `${session.index + 1}/${session.words.length}`;
      message.textContent = "";
      progressFill.style.width = `${Math.round((session.index / session.words.length) * 100)}%`;
      resetRunner();
      renderWordRail();
      renderObstacles();
      speakWord(current.word);
      window.setTimeout(() => syllableInput.focus(), 80);
    }

    function renderWordRail() {
      wordRail.innerHTML = session.words.map((item, index) => {
        const result = session.results[index];
        const classes = ["word-card"];
        if (index === session.index) classes.push("current");
        if (result.status === "correct") classes.push("correct");
        if (result.status === "wrong") classes.push("wrong");
        return `
          <article class="${classes.join(" ")}">
            <img src="${wordImage(item.word)}" alt="${escapeHtml(item.word)}">
            <div>
              <b>${escapeHtml(item.word)}</b>
              <span>${wordStatusLabel(result.status, index)}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderObstacles() {
      const current = getCurrentWord();
      const total = current.syllables.length;
      obstacles.innerHTML = current.syllables.map((_, index) => {
        const kind = obstacleKindForSyllable(current, index);
        const file = kind === "jump" ? "generated-jump-log.png" : "generated-slide-arch.png";
        return `
          <div class="obstacle ${kind}" style="left: ${obstacleLeft(index, total)}%;">
            <img src="${runnerImage(file)}" alt="">
          </div>
        `;
      }).join("");
    }

    function checkAnswer() {
      if (busy || !session) return;
      const current = getCurrentWord();
      const rawAnswer = syllableInput.value.trim();
      if (!rawAnswer) {
        message.textContent = "Type the syllables first.";
        syllableInput.focus();
        return;
      }

      const isCorrect = normalizeSyllableAnswer(rawAnswer) === normalizeSyllableAnswer(current.syllables.join(" "));
      markCurrent(isCorrect, rawAnswer);
      message.textContent = isCorrect ? "Correct run!" : "Not quite. Try again or press Hint.";
      playSound(isCorrect ? "correct" : "wrong");
      animateRun(isCorrect, isCorrect ? nextWord : retryWord);
    }

    function clearAnswer() {
      if (busy) return;
      playSound("click");
      syllableInput.value = "";
      hintBox.textContent = "";
      hintBox.classList.add("hidden");
      message.textContent = "";
      syllableInput.focus();
    }

    function showHint() {
      if (busy || !session) return;
      const current = getCurrentWord();
      playSound("hint");
      hintBox.textContent = `Hint: ${current.syllables.join(" / ")}`;
      hintBox.classList.remove("hidden");
      syllableInput.focus();
    }

    function markCurrent(correct, answer = syllableInput.value.trim()) {
      const current = getCurrentWord();
      session.results[session.index] = {
        word: current.word,
        status: correct ? "correct" : "wrong",
        answer
      };

      if (correct) {
        session.score += 10;
        session.earned += 2;
      }

      renderWordRail();
      scoreValue.textContent = String(session.score);
    }

    function nextWord() {
      busy = false;
      session.index += 1;
      setTimeout(loadWord, 200);
    }

    function retryWord() {
      busy = false;
      syllableInput.value = "";
      resetRunner();
      renderWordRail();
      syllableInput.focus();
    }

    function finishLevel() {
      const correctCount = session.results.filter((item) => item.status === "correct").length;
      const perfect = correctCount === session.words.length;
      const bonus = perfect ? session.level.reward : Math.ceil(session.level.reward / 2);
      session.earned += bonus;
      state.credits += session.earned;

      if (perfect && session.level.id < LEVELS.length) {
        state.highestLevel = Math.max(state.highestLevel, session.level.id + 1);
      }

      saveState();
      progressFill.style.width = "100%";
      endTitle.textContent = perfect ? "Perfect Run" : "Run Complete";
      endScore.textContent = String(session.score);
      endGold.textContent = String(session.earned);
      endCorrect.textContent = `${correctCount}/${session.words.length}`;
      nextLevelButton.classList.toggle("hidden", !(session.level.id < LEVELS.length && session.level.id < state.highestLevel));
      reviewGrid.innerHTML = session.results.map((result) => {
        return `
          <article class="result-card ${result.status === "correct" ? "correct" : "wrong"}">
            <img src="${wordImage(result.word)}" alt="${escapeHtml(result.word)}">
            <div>
              <b>${escapeHtml(result.word)}</b>
              <span>${result.status === "correct" ? "Correct" : "Try again"}</span>
            </div>
          </article>
        `;
      }).join("");
      renderAll();
      showScreen("endScreen");
      playSound(perfect ? "complete" : "finish");
    }

    function animateRun(success, done) {
      busy = true;
      setControlsDisabled(true);
      resetRunner();

      const current = getCurrentWord();
      const steps = current.syllables.map((_, index) => obstacleKindForSyllable(current, index));
      let stepIndex = 0;

      const move = () => {
        if (stepIndex >= steps.length) {
          runner.style.left = "calc(86% - 64px)";
          window.setTimeout(() => {
            setControlsDisabled(false);
            done();
          }, 520);
          return;
        }

        runner.style.left = `calc(${obstacleLeft(stepIndex, steps.length)}% - 58px)`;

        if (!success && stepIndex === 0) {
          window.setTimeout(() => {
            runner.classList.add("hit");
            window.setTimeout(() => {
              runner.classList.remove("hit");
              setControlsDisabled(false);
              done();
            }, 620);
          }, 230);
          return;
        }

        const action = steps[stepIndex];
        window.setTimeout(() => {
          runner.classList.add(action);
          playSound(action);
        }, 90);
        window.setTimeout(() => {
          runner.classList.remove(action);
          stepIndex += 1;
          move();
        }, action === "jump" ? 680 : 560);
      };

      window.setTimeout(move, 90);
    }

    function speakWord(word) {
      if (!("speechSynthesis" in window) || typeof SpeechSynthesisUtterance === "undefined") return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = "en-US";
      utterance.rate = 0.82;
      utterance.pitch = 1.08;
      utterance.volume = window.KINGDOM_NARRATOR_VOLUME?.() ?? 0.45;
      window.speechSynthesis.speak(utterance);
    }

    function unlockAudio() {
      const context = getAudioContext();
      if (context?.state === "suspended") {
        context.resume().catch(() => {});
      }
    }

    function getAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;
      if (!audioContext) audioContext = new AudioContextClass();
      return audioContext;
    }

    function playSound(kind) {
      const context = getAudioContext();
      if (!context) return;
      if (context.state === "suspended") {
        context.resume().catch(() => {});
      }

      const now = context.currentTime;
      const patterns = {
        click: [[260, 0, 0.045, "triangle", 0.035]],
        speak: [[440, 0, 0.055, "sine", 0.035]],
        hint: [[392, 0, 0.07, "sine", 0.04], [523, 0.08, 0.09, "sine", 0.04]],
        correct: [[523, 0, 0.08, "triangle", 0.045], [659, 0.08, 0.08, "triangle", 0.045], [784, 0.16, 0.12, "triangle", 0.05]],
        wrong: [[180, 0, 0.13, "sawtooth", 0.035], [130, 0.12, 0.16, "sawtooth", 0.03]],
        jump: [[620, 0, 0.08, "sine", 0.035]],
        slide: [[240, 0, 0.11, "triangle", 0.035]],
        finish: [[392, 0, 0.1, "triangle", 0.04], [330, 0.1, 0.13, "triangle", 0.04]],
        complete: [[523, 0, 0.09, "triangle", 0.045], [659, 0.1, 0.09, "triangle", 0.045], [784, 0.2, 0.16, "triangle", 0.055]]
      };

      (patterns[kind] || patterns.click).forEach(([frequency, delay, duration, type, volume]) => {
        playTone(context, frequency, now + delay, duration, type, volume);
      });
    }

    function playTone(context, frequency, start, duration, type, volume) {
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      oscillator.connect(gain);
      gain.connect(context.destination);
      oscillator.start(start);
      oscillator.stop(start + duration + 0.02);
    }

    function setControlsDisabled(disabled) {
      runButton.disabled = disabled;
      hintButton.disabled = disabled;
      clearButton.disabled = disabled;
      skipButton.disabled = disabled;
      speakButton.disabled = disabled;
      syllableInput.disabled = disabled;
    }

    function resetRunner() {
      runner.className = "runner";
      runner.style.left = "34px";
    }

    function chooseSkin(id) {
      const skin = SKINS.find((item) => item.id === id);
      if (!skin) return;

      if (!state.ownedSkins.has(id)) {
        if (state.credits < skin.price) return;
        state.credits -= skin.price;
        state.ownedSkins.add(id);
      }

      state.selectedSkin = id;
      saveState();
      renderAll();
    }

    function showScreen(id) {
      screens.forEach((screen) => screen.classList.toggle("active", screen.id === id));
      if (id === "skinsScreen") renderSkins();
      if (id === "levelsScreen") renderLevels();
      if (id === "homeScreen") renderHome();
    }

    function getCurrentWord() {
      return session.words[session.index];
    }

    function getSelectedSkin() {
      return SKINS.find((skin) => skin.id === state.selectedSkin) || SKINS[0];
    }

    function wordStatusLabel(status, index) {
      if (status === "correct") return "Correct";
      if (status === "wrong") return "Try again";
      if (index === session.index) return "Current";
      return "Waiting";
    }

    function normalizeSyllableAnswer(value) {
      return String(value)
        .toLowerCase()
        .replace(/[^a-z]+/g, "|")
        .replace(/^\|+|\|+$/g, "")
        .replace(/\|+/g, "|");
    }

    function obstacleKindForSyllable(wordData, index) {
      const type = wordData.types?.[index] || inferSyllableType(wordData.syllables[index]);
      return type === "open" ? "jump" : "slide";
    }

    function inferSyllableType(syllable) {
      return /[aeiouy]$/i.test(syllable) ? "open" : "closed";
    }

    function wordImage(word) {
      return `${WORD_IMAGE_BASE}${word}.png`;
    }

    function runnerImage(file) {
      return `${RUNNER_IMAGE_BASE}${file}`;
    }

    function obstacleLeft(index, total) {
      if (total <= 1) return 52;
      return 34 + index * (42 / (total - 1));
    }

    function shuffle(items) {
      for (let index = items.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [items[index], items[swapIndex]] = [items[swapIndex], items[index]];
      }
      return items;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function readNumber(key, fallback) {
      const value = Number(localStorage.getItem(key));
      return Number.isFinite(value) ? value : fallback;
    }

    function readOwnedSkins() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE.owned) || "[]");
        if (Array.isArray(parsed)) return new Set(parsed);
      } catch (error) {
        return new Set(["prince"]);
      }
      return new Set(["prince"]);
    }

    function sanitizeState() {
      state.ownedSkins.add("prince");
      if (!SKINS.some((skin) => skin.id === state.selectedSkin)) {
        state.selectedSkin = "prince";
      }
      if (!state.ownedSkins.has(state.selectedSkin)) {
        state.selectedSkin = "prince";
      }
      saveState();
    }

    function saveState() {
      localStorage.setItem(STORAGE.credits, String(state.credits));
      localStorage.setItem(STORAGE.high, String(state.highestLevel));
      localStorage.setItem(STORAGE.skin, state.selectedSkin);
      localStorage.setItem(STORAGE.owned, JSON.stringify([...state.ownedSkins]));
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
