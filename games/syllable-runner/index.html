<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyberpunk Syllable Runner</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    background:
        radial-gradient(circle at top,#1f1147 0%,#090014 40%,#000000 100%);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

/* animated cyber background */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,0,255,0.08) 1px, transparent 1px);
    background-size:50px 50px;
    animation:gridMove 12s linear infinite;
    pointer-events:none;
}

@keyframes gridMove{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(50px);
    }
}

#game{
    width:1050px;
    padding:30px;
    border-radius:25px;
    background:rgba(10,10,30,0.85);
    border:2px solid #00eaff;
    box-shadow:
        0 0 20px #00eaff,
        0 0 40px rgba(255,0,255,0.5);
    backdrop-filter:blur(8px);
    text-align:center;
    position:relative;
}

h1{
    margin-top:0;
    font-size:48px;
    color:#00eaff;
    text-shadow:
        0 0 10px #00eaff,
        0 0 20px #00eaff;
}

#word{
    font-size:60px;
    font-weight:bold;
    margin-bottom:25px;
    color:#ff4dff;
    text-shadow:
        0 0 12px #ff4dff,
        0 0 24px #ff4dff;
    letter-spacing:4px;
}

#inputArea{
    margin-top:20px;
}

#answerInput{
    width:380px;
    padding:16px;
    border-radius:14px;
    border:2px solid #00eaff;
    background:#111122;
    color:white;
    font-size:22px;
    text-align:center;
    outline:none;
    box-shadow:0 0 15px rgba(0,234,255,0.5);
}

#answerInput::placeholder{
    color:#9cc;
}

#submitBtn{
    padding:16px 28px;
    margin-left:10px;
    border:none;
    border-radius:14px;
    background:linear-gradient(45deg,#00eaff,#ff00ff);
    color:white;
    font-size:22px;
    font-family:'Orbitron',sans-serif;
    cursor:pointer;
    transition:0.25s;
    box-shadow:
        0 0 10px #00eaff,
        0 0 20px #ff00ff;
}

#submitBtn:hover{
    transform:scale(1.08);
    box-shadow:
        0 0 20px #00eaff,
        0 0 35px #ff00ff;
}

#musicToggle{
    position:absolute;
    top:18px;
    right:18px;
    width:48px;
    height:48px;
    border:1px solid rgba(0,234,255,0.9);
    border-radius:50%;
    background:rgba(8,8,28,0.75);
    color:#00eaff;
    font-size:14px;
    font-family:'Orbitron',sans-serif;
    font-weight:700;
    cursor:pointer;
    box-shadow:
        0 0 10px rgba(0,234,255,0.55),
        inset 0 0 10px rgba(255,0,255,0.2);
    transition:0.2s;
}

#musicToggle:hover{
    transform:scale(1.08);
    color:#ff4dff;
}

#musicToggle.is-off{
    color:#7c87a8;
    border-color:rgba(124,135,168,0.8);
    box-shadow:inset 0 0 10px rgba(124,135,168,0.18);
}

.screen{
    min-height:560px;
}

.is-hidden{
    display:none;
}

.menuPanel{
    display:grid;
    gap:18px;
    max-width:760px;
    margin:0 auto;
}

.menuStats,
.hud{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    margin:10px 0 20px;
}

.statBox,
.levelCard,
.skinCard{
    border:1px solid rgba(0,234,255,0.45);
    border-radius:8px;
    background:rgba(6,10,35,0.72);
    box-shadow:inset 0 0 18px rgba(0,234,255,0.12);
    padding:14px;
}

.statLabel,
.cardMeta{
    color:#9fd7ff;
    font-size:12px;
    margin-bottom:6px;
}

.statValue{
    color:#00ffae;
    font-size:24px;
    text-shadow:0 0 10px rgba(0,255,174,0.75);
}

.menuActions{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
}

.cyberBtn{
    min-height:54px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#00eaff,#ff00ff);
    color:white;
    font-size:18px;
    font-family:'Orbitron',sans-serif;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
    box-shadow:
        0 0 10px rgba(0,234,255,0.65),
        0 0 20px rgba(255,0,255,0.45);
}

.cyberBtn:hover{
    transform:translateY(-2px) scale(1.02);
}

.cyberBtn.secondary{
    background:rgba(12,20,55,0.9);
    border:1px solid rgba(0,234,255,0.65);
}

.cyberBtn:disabled,
.levelCard.locked,
.skinCard.locked{
    cursor:not-allowed;
    opacity:0.45;
    filter:saturate(0.55);
}

.levelGrid,
.shopGrid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
    margin:20px 0;
}

.levelCard,
.skinCard{
    min-height:170px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    text-align:left;
}

.cardTitle{
    color:#ff4dff;
    font-size:22px;
    margin-bottom:8px;
    text-shadow:0 0 10px rgba(255,77,255,0.75);
}

.skinPreview{
    font-size:48px;
    text-align:center;
    filter:
        drop-shadow(0 0 8px #00eaff)
        drop-shadow(0 0 14px #ff00ff);
}

#menuSubtitle,
#endSummary{
    color:#b8b8ff;
    line-height:1.6;
}

#levelTitle{
    color:#00eaff;
    margin-bottom:0;
}

#scene{
    position:relative;
    width:100%;
    height:320px;
    margin-top:45px;
    overflow:hidden;
    border-radius:20px;
    background:
        linear-gradient(to top,
        #120021 0%,
        #1a1040 35%,
        #120033 100%);
    border:3px solid #00eaff;
    box-shadow:
        inset 0 0 30px rgba(0,255,255,0.2),
        0 0 25px rgba(255,0,255,0.4);
}

/* neon city */

.city{
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    background:
        repeating-linear-gradient(
            to right,
            #0ff 0 20px,
            transparent 20px 40px,
            #f0f 40px 60px,
            transparent 60px 90px
        );
    opacity:0.15;
}

.road{
    position:absolute;
    bottom:0;
    width:100%;
    height:70px;
    background:#050505;
    border-top:4px solid #ff00ff;
}

.road::before{
    content:"";
    position:absolute;
    top:30px;
    width:100%;
    height:5px;
    background:
        repeating-linear-gradient(
            to right,
            #00eaff 0 40px,
            transparent 40px 80px
        );
    animation:roadMove 1s linear infinite;
}

@keyframes roadMove{
    from{
        background-position-x:0;
    }
    to{
        background-position-x:-80px;
    }
}

#character{
    position:absolute;
    left:50px;
    bottom:40px;
    font-size:80px;
    transition:0.4s;
    transform:scaleX(-1);
    filter:
        drop-shadow(0 0 10px #00eaff)
        drop-shadow(0 0 20px #ff00ff);
    z-index:10;
}

.obstacle{
    position:absolute;
    font-size:75px;
    filter:
        drop-shadow(0 0 10px #ff0000)
        drop-shadow(0 0 20px #ff00ff);
}

.slide{
    transform:scaleX(-1) translateY(45px);
}

.hit{
    transform:scaleX(-1) rotate(-25deg);
}

#score{
    margin-top:20px;
    font-size:30px;
    color:#00ffae;
    text-shadow:0 0 10px #00ffae;
}

#progress{
    margin-top:10px;
    color:#b8b8ff;
    font-size:18px;
}

.correctFlash{
    animation:greenFlash 0.5s;
}

.wrongFlash{
    animation:redFlash 0.5s;
}

@keyframes greenFlash{
    0%{
        box-shadow:
            0 0 50px #00ff88;
    }
    100%{
        box-shadow:
            0 0 20px #00eaff;
    }
}

@keyframes redFlash{
    0%{
        box-shadow:
            0 0 50px #ff003c;
    }
    100%{
        box-shadow:
            0 0 20px #00eaff;
    }
}

/* stars */

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:blink 2s infinite alternate;
}

@keyframes blink{
    from{
        opacity:0.2;
    }
    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div id="game">

    <button id="musicToggle" type="button" aria-label="Toggle music" title="Toggle music">
        M
    </button>

    <h1>&#9889; CYBER SYLLABLE RUNNER &#9889;</h1>

    <div id="mainMenu" class="screen">

        <div class="menuPanel">

            <div id="menuSubtitle">
                Train syllables, clear cyber missions, earn credits, and unlock runner skins.
            </div>

            <div class="menuStats">
                <div class="statBox">
                    <div class="statLabel">CREDITS</div>
                    <div class="statValue" id="creditsStat">0</div>
                </div>
                <div class="statBox">
                    <div class="statLabel">LEVEL</div>
                    <div class="statValue" id="levelStat">1</div>
                </div>
                <div class="statBox">
                    <div class="statLabel">SKINS</div>
                    <div class="statValue" id="skinsStat">1</div>
                </div>
            </div>

            <div class="menuActions">
                <button class="cyberBtn" id="playBtn">PLAY</button>
                <button class="cyberBtn secondary" id="levelsBtn">LEVELS</button>
                <button class="cyberBtn secondary" id="shopBtn">SHOP</button>
            </div>

        </div>

    </div>

    <div id="levelsScreen" class="screen is-hidden">

        <h2 id="levelTitle">SELECT LEVEL</h2>

        <div id="levelGrid" class="levelGrid"></div>

        <button class="cyberBtn secondary" id="backFromLevels">BACK</button>

    </div>

    <div id="shopScreen" class="screen is-hidden">

        <h2 id="levelTitle">NEON SHOP</h2>

        <div id="shopGrid" class="shopGrid"></div>

        <button class="cyberBtn secondary" id="backFromShop">BACK</button>

    </div>

    <div id="playScreen" class="screen is-hidden">

        <div class="hud">
            <div class="statBox">
                <div class="statLabel">MISSION SCORE</div>
                <div class="statValue" id="score">0</div>
            </div>
            <div class="statBox">
                <div class="statLabel">CREDITS</div>
                <div class="statValue" id="creditsHud">0</div>
            </div>
            <div class="statBox">
                <div class="statLabel">PROGRESS</div>
                <div class="statValue" id="progressPercent">0%</div>
            </div>
        </div>

        <div id="word"></div>

        <div id="inputArea">

            <input
                type="text"
                id="answerInput"
                placeholder="Type syllables like: ba na na"
                autocomplete="off"
            >

            <button id="submitBtn">
                RUN
            </button>

        </div>

        <div id="scene">

            <div class="city"></div>
            <div class="road"></div>

            <div id="character">&#129302;</div>

        </div>

        <div id="progress"></div>

    </div>

    <div id="endScreen" class="screen is-hidden">

        <div class="menuPanel">
            <h2 id="levelTitle">MISSION COMPLETE</h2>
            <div id="endSummary"></div>
            <div class="menuActions">
                <button class="cyberBtn" id="nextLevelBtn">NEXT LEVEL</button>
                <button class="cyberBtn secondary" id="replayBtn">REPLAY</button>
                <button class="cyberBtn secondary" id="menuBtn">MENU</button>
            </div>
        </div>

    </div>

</div>

<script>

/* stars */

for(let i=0;i<60;i++){

    const star=document.createElement("div");

    star.classList.add("star");

    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";

    star.style.animationDuration=
        (1+Math.random()*3)+"s";

    document.body.appendChild(star);

}

function shuffle(array){

    return array.sort(() => Math.random() - 0.5);

}

const words = [

{word:"banana",correct:["ba","na","na"],types:["open","open","open"]},
{word:"basket",correct:["bas","ket"],types:["closed","closed"]},
{word:"robot",correct:["ro","bot"],types:["open","closed"]},
{word:"window",correct:["win","dow"],types:["closed","open"]},
{word:"tomato",correct:["to","ma","to"],types:["open","open","open"]},
{word:"paper",correct:["pa","per"],types:["open","closed"]},
{word:"music",correct:["mu","sic"],types:["open","closed"]},
{word:"hotel",correct:["ho","tel"],types:["open","closed"]},
{word:"student",correct:["stu","dent"],types:["open","closed"]},
{word:"family",correct:["fa","mi","ly"],types:["open","open","closed"]}

];

const levels = [
    {
        id:1,
        name:"Neon Rookie",
        count:4,
        reward:12,
        unlockScore:0
    },
    {
        id:2,
        name:"Data Dash",
        count:6,
        reward:18,
        unlockScore:30
    },
    {
        id:3,
        name:"Chrome Storm",
        count:8,
        reward:25,
        unlockScore:80
    }
];

const skins = [
    {id:"bot",name:"Default Bot",icon:"&#129302;",price:0},
    {id:"ninja",name:"Neon Ninja",icon:"&#129399;",price:60},
    {id:"alien",name:"Star Runner",icon:"&#128125;",price:90},
    {id:"ghost",name:"Glitch Ghost",icon:"&#128123;",price:120},
    {id:"rocket",name:"Rocket Unit",icon:"&#128640;",price:160},
    {id:"dragon",name:"Cyber Dragon",icon:"&#128009;",price:220}
];

let gameWords = [];
let current = 0;
let score = 0;
let earnedThisRun = 0;
let selectedLevel = 1;
let acceptingAnswer = false;
let totalCredits = Number(localStorage.getItem("csrCredits")) || 0;
let highestLevel = Number(localStorage.getItem("csrHighestLevel")) || 1;
let selectedSkin = localStorage.getItem("csrSelectedSkin") || "bot";
let ownedSkins = JSON.parse(localStorage.getItem("csrOwnedSkins") || "[\"bot\"]");
let musicStarted = false;
let musicMuted = false;
let audioCtx;
let musicMaster;
let bassTimer;
let padTimer;
let pulseTimer;

const wordDiv = document.getElementById("word");
const answerInput = document.getElementById("answerInput");
const submitBtn = document.getElementById("submitBtn");
const musicToggle = document.getElementById("musicToggle");
const mainMenu = document.getElementById("mainMenu");
const levelsScreen = document.getElementById("levelsScreen");
const shopScreen = document.getElementById("shopScreen");
const playScreen = document.getElementById("playScreen");
const endScreen = document.getElementById("endScreen");
const playBtn = document.getElementById("playBtn");
const levelsBtn = document.getElementById("levelsBtn");
const shopBtn = document.getElementById("shopBtn");
const backFromLevels = document.getElementById("backFromLevels");
const backFromShop = document.getElementById("backFromShop");
const levelGrid = document.getElementById("levelGrid");
const shopGrid = document.getElementById("shopGrid");
const creditsStat = document.getElementById("creditsStat");
const levelStat = document.getElementById("levelStat");
const skinsStat = document.getElementById("skinsStat");
const creditsHud = document.getElementById("creditsHud");
const progressPercent = document.getElementById("progressPercent");
const endSummary = document.getElementById("endSummary");
const nextLevelBtn = document.getElementById("nextLevelBtn");
const replayBtn = document.getElementById("replayBtn");
const menuBtn = document.getElementById("menuBtn");
const scene = document.getElementById("scene");
const character = document.getElementById("character");
const scoreDiv = document.getElementById("score");
const progressDiv = document.getElementById("progress");
const gameDiv = document.getElementById("game");

function saveProgress(){

    localStorage.setItem("csrCredits",String(totalCredits));
    localStorage.setItem("csrHighestLevel",String(highestLevel));
    localStorage.setItem("csrSelectedSkin",selectedSkin);
    localStorage.setItem("csrOwnedSkins",JSON.stringify(ownedSkins));

}

function activeSkin(){

    return skins.find(skin => skin.id === selectedSkin) || skins[0];

}

function showScreen(screen){

    [mainMenu,levelsScreen,shopScreen,playScreen,endScreen]
        .forEach(item => item.classList.add("is-hidden"));

    screen.classList.remove("is-hidden");

}

function updateStats(){

    creditsStat.textContent = totalCredits;
    levelStat.textContent = highestLevel;
    skinsStat.textContent = ownedSkins.length;
    creditsHud.textContent = totalCredits;

}

function renderLevels(){

    levelGrid.innerHTML = "";

    levels.forEach(level => {

        const isLocked = level.id > highestLevel;
        const card = document.createElement("div");
        card.className = "levelCard" + (isLocked ? " locked" : "");

        card.innerHTML =
            "<div>" +
                "<div class='cardMeta'>LEVEL " + level.id + "</div>" +
                "<div class='cardTitle'>" + level.name + "</div>" +
                "<div class='cardMeta'>" + level.count + " words · +" + level.reward + " credits per correct answer</div>" +
            "</div>" +
            "<button class='cyberBtn' " + (isLocked ? "disabled" : "") + ">" +
                (isLocked ? "LOCKED" : "START") +
            "</button>";

        card.querySelector("button").onclick = () => {

            if(!isLocked){

                startLevel(level.id);

            }

        };

        levelGrid.appendChild(card);

    });

}

function renderShop(){

    shopGrid.innerHTML = "";

    skins.forEach(skin => {

        const owned = ownedSkins.includes(skin.id);
        const selected = selectedSkin === skin.id;
        const canBuy = totalCredits >= skin.price;
        const card = document.createElement("div");
        card.className = "skinCard" + (!owned && !canBuy ? " locked" : "");
        const buttonText = selected ? "EQUIPPED" : owned ? "EQUIP" : "BUY " + skin.price;

        card.innerHTML =
            "<div>" +
                "<div class='skinPreview'>" + skin.icon + "</div>" +
                "<div class='cardTitle'>" + skin.name + "</div>" +
                "<div class='cardMeta'>" + (owned ? "Owned" : skin.price + " credits") + "</div>" +
            "</div>" +
            "<button class='cyberBtn' " + (selected || (!owned && !canBuy) ? "disabled" : "") + ">" +
                buttonText +
            "</button>";

        card.querySelector("button").onclick = () => {

            if(!owned){

                totalCredits -= skin.price;
                ownedSkins.push(skin.id);

            }

            selectedSkin = skin.id;
            character.innerHTML = activeSkin().icon;
            saveProgress();
            updateStats();
            renderShop();

        };

        shopGrid.appendChild(card);

    });

}

function showMenu(){

    updateStats();
    showScreen(mainMenu);

}

function startLevel(levelId){

    const level = levels.find(item => item.id === levelId) || levels[0];

    selectedLevel = level.id;
    gameWords = shuffle([...words]).slice(0,level.count);
    current = 0;
    score = 0;
    earnedThisRun = 0;
    acceptingAnswer = true;
    character.innerHTML = activeSkin().icon;
    scoreDiv.textContent = "0";
    progressPercent.textContent = "0%";
    answerInput.style.display = "";
    submitBtn.style.display = "";

    showScreen(playScreen);
    updateStats();
    loadWord();

}

function createObstacles(types){

    document
        .querySelectorAll(".obstacle")
        .forEach(o => o.remove());

    let startX = 300;

    types.forEach((type,index)=>{

        const obstacle =
            document.createElement("div");

        obstacle.classList.add("obstacle");

        obstacle.innerHTML = "&#9889;";

        obstacle.style.left =
            (startX + index * 180) + "px";

        if(type === "open"){

            obstacle.style.bottom = "50px";

        }

        else{

            obstacle.style.top = "40px";

        }

        scene.appendChild(obstacle);

    });

}

function loadWord(){

    character.style.left = "50px";

    character.style.bottom = "40px";

    character.className = "";

    const item = gameWords[current];

    wordDiv.textContent = item.word;

    speakWord(item.word);

    progressDiv.textContent =
        "LEVEL " +
        selectedLevel +
        " · MISSION " +
        (current + 1) +
        " / " +
        gameWords.length;

    progressPercent.textContent =
        Math.round((current / gameWords.length) * 100) + "%";

    createObstacles(item.types);

    answerInput.value = "";

    acceptingAnswer = true;

    answerInput.focus();

}

function playTone(frequency,start,duration,type,gain,filterFrequency){

    if(!audioCtx || !musicMaster){

        return;

    }

    const oscillator = audioCtx.createOscillator();
    const filter = audioCtx.createBiquadFilter();
    const amp = audioCtx.createGain();

    oscillator.type = type;
    oscillator.frequency.setValueAtTime(frequency,start);

    filter.type = "lowpass";
    filter.frequency.setValueAtTime(filterFrequency,start);
    filter.Q.setValueAtTime(1.8,start);

    amp.gain.setValueAtTime(0.0001,start);
    amp.gain.exponentialRampToValueAtTime(gain,start + 0.03);
    amp.gain.exponentialRampToValueAtTime(0.0001,start + duration);

    oscillator.connect(filter);
    filter.connect(amp);
    amp.connect(musicMaster);

    oscillator.start(start);
    oscillator.stop(start + duration + 0.08);

}

function startCyberMusic(){

    if(musicStarted || musicMuted){

        return;

    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicMaster = audioCtx.createGain();
    const compressor = audioCtx.createDynamicsCompressor();

    musicMaster.gain.value = 0.11;
    compressor.threshold.value = -26;
    compressor.knee.value = 24;
    compressor.ratio.value = 8;
    compressor.attack.value = 0.02;
    compressor.release.value = 0.25;

    musicMaster.connect(compressor);
    compressor.connect(audioCtx.destination);

    musicStarted = true;
    musicToggle.classList.remove("is-off");
    musicToggle.textContent = "M";

    const beat = 60 / 86;
    const bass = [55,55,82.41,73.42,49,49,73.42,82.41];
    const padChords = [
        [220,277.18,329.63],
        [196,246.94,293.66],
        [164.81,220,261.63],
        [184.99,233.08,277.18]
    ];
    let bassStep = 0;
    let padStep = 0;
    let pulseStep = 0;

    function scheduleBass(){

        const now = audioCtx.currentTime;

        for(let i=0;i<8;i++){

            const note = bass[(bassStep + i) % bass.length];
            playTone(note,now + i * beat * 0.5,beat * 0.42,"sawtooth",0.08,260);

        }

        bassStep = (bassStep + 8) % bass.length;

    }

    function schedulePads(){

        const now = audioCtx.currentTime;
        const chord = padChords[padStep % padChords.length];

        chord.forEach((note)=>{

            playTone(note,now,beat * 3.8,"triangle",0.025,900);
            playTone(note * 2,now + 0.02,beat * 3.6,"sine",0.012,1200);

        });

        padStep++;

    }

    function schedulePulse(){

        const now = audioCtx.currentTime;
        const note = pulseStep % 2 === 0 ? 880 : 659.25;

        playTone(note,now,beat * 0.22,"square",0.012,1800);
        pulseStep++;

    }

    scheduleBass();
    schedulePads();
    schedulePulse();

    bassTimer = setInterval(scheduleBass,beat * 4 * 1000);
    padTimer = setInterval(schedulePads,beat * 4 * 1000);
    pulseTimer = setInterval(schedulePulse,beat * 2 * 1000);

}

function toggleMusic(){

    if(!musicStarted){

        musicMuted = false;
        startCyberMusic();
        return;

    }

    musicMuted = !musicMuted;

    if(musicMaster){

        musicMaster.gain.setTargetAtTime(
            musicMuted ? 0.0001 : 0.11,
            audioCtx.currentTime,
            0.08
        );

    }

    musicToggle.classList.toggle("is-off",musicMuted);
    musicToggle.textContent = musicMuted ? "OFF" : "M";

}

function animateRun(types, success, callback){

    let index = 0;

    function nextObstacle(){

        if(index >= types.length){

            callback();
            return;
        }

        const type = types[index];

        const obstacleX =
            300 + index * 180;

        character.style.left =
            obstacleX - 140 + "px";

        setTimeout(()=>{

            if(!success && index === 0){

                character.classList.add("hit");

                character.style.left =
                    obstacleX - 20 + "px";

                setTimeout(()=>{

                    character.classList.remove("hit");

                    callback();

                },700);

                return;
            }

            if(type === "open"){

                character.style.left =
                    obstacleX + 20 + "px";

                character.style.bottom = "190px";

                setTimeout(()=>{

                    character.style.left =
                        obstacleX + 120 + "px";

                    character.style.bottom = "40px";

                    setTimeout(()=>{

                        index++;
                        nextObstacle();

                    },350);

                },450);

            }

            else{

                character.classList.add("slide");

                character.style.left =
                    obstacleX + 40 + "px";

                setTimeout(()=>{

                    character.classList.remove("slide");

                    character.style.left =
                        obstacleX + 120 + "px";

                    setTimeout(()=>{

                        index++;
                        nextObstacle();

                    },250);

                },450);

            }

        },350);

    }

    nextObstacle();

}

function checkAnswer(answer){

    if(!acceptingAnswer){

        return;

    }

    acceptingAnswer = false;
    startCyberMusic();

    const item = gameWords[current];

    const correct =
        item.correct.join(" ")
        .toLowerCase()
        .trim();

    const userAnswer =
        answer
        .toLowerCase()
        .trim()
        .replace(/\s+/g," ");

    if(userAnswer === correct){

        score++;
        const level = levels.find(item => item.id === selectedLevel) || levels[0];
        totalCredits += level.reward;
        earnedThisRun += level.reward;

        scoreDiv.textContent =
            score;

        updateStats();
        saveProgress();

        gameDiv.classList.add("correctFlash");

        setTimeout(()=>{

            gameDiv.classList.remove("correctFlash");

        },500);

        animateRun(item.types,true,()=>{

            nextWord();

        });

    }

    else{

        gameDiv.classList.add("wrongFlash");

        setTimeout(()=>{

            gameDiv.classList.remove("wrongFlash");

        },500);

        animateRun(item.types,false,()=>{

            nextWord();

        });

    }

}

function nextWord(){

    current++;

    if(current >= gameWords.length){

        document
            .querySelectorAll(".obstacle")
            .forEach(o=>o.remove());

        finishLevel();
        return;
    }

    loadWord();

}

function finishLevel(){

    acceptingAnswer = false;

    const level = levels.find(item => item.id === selectedLevel) || levels[0];
    const accuracy = Math.round((score / gameWords.length) * 100);
    const nextLevel = selectedLevel + 1;

    if(nextLevel <= levels.length && accuracy >= 60){

        highestLevel = Math.max(highestLevel,nextLevel);

    }

    saveProgress();
    updateStats();
    progressPercent.textContent = "100%";

    endSummary.innerHTML =
        "Accuracy: " + accuracy + "%<br>" +
        "Correct answers: " + score + " / " + gameWords.length + "<br>" +
        "Credits earned: +" + earnedThisRun + "<br>" +
        (accuracy >= 60
            ? "Progression unlocked. The neon route is open."
            : "Score 60% or higher to unlock the next route.");

    nextLevelBtn.style.display =
        nextLevel <= highestLevel && nextLevel <= levels.length ? "" : "none";

    showScreen(endScreen);

}

submitBtn.onclick = ()=>{

    checkAnswer(answerInput.value);

};

musicToggle.onclick = ()=>{

    toggleMusic();

};

playBtn.onclick = ()=>{

    startLevel(highestLevel);

};

levelsBtn.onclick = ()=>{

    renderLevels();
    showScreen(levelsScreen);

};

shopBtn.onclick = ()=>{

    renderShop();
    showScreen(shopScreen);

};

backFromLevels.onclick = ()=>{

    showMenu();

};

backFromShop.onclick = ()=>{

    showMenu();

};

nextLevelBtn.onclick = ()=>{

    startLevel(selectedLevel + 1);

};

replayBtn.onclick = ()=>{

    startLevel(selectedLevel);

};

menuBtn.onclick = ()=>{

    showMenu();

};

answerInput.addEventListener("keydown",(e)=>{

    if(e.key === "Enter"){

        checkAnswer(answerInput.value);

    }

});

function speakWord(word){

    const speech =
        new SpeechSynthesisUtterance(word);

    speech.lang = "en-US";

    speech.rate = 0.9;

    speech.pitch = 1;

    speech.volume = 1;

    speechSynthesis.speak(speech);

}

character.innerHTML = activeSkin().icon;
showMenu();

</script>
